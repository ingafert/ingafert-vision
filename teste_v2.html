<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<title>Ingafert Vision V2</title>

<style>

body{

font-family:Arial;

background:#14361d;

color:white;

padding:30px;

}

button{

padding:12px 25px;

font-size:18px;

cursor:pointer;

margin-top:20px;

}

img{

max-width:350px;

margin-top:20px;

border-radius:10px;

}

pre{

background:#111;

padding:20px;

border-radius:10px;

margin-top:20px;

white-space:pre-wrap;

}

</style>

</head>

<body>

<h1>INGAFERT VISION AI V2</h1>

<input
type="file"
id="foto"
accept="image/*"
capture="environment">

<br>

<button onclick="analisar()">

Analisar Peça

</button>

<img id="preview">

<pre id="resultado">

Aguardando...

</pre>

<script>

async function analisar(){

const foto=document.getElementById("foto");

if(!foto.files.length){

alert("Escolha uma imagem.");

return;

}

const leitor=new FileReader();

leitor.onload=async()=>{

document.getElementById("preview").src=leitor.result;

const resposta = await fetch("/api/analisar_v2",{

    method:"POST",

    headers:{
        "Content-Type":"application/json"
    },

    body:JSON.stringify({

        imagem:leitor.result

    })

});

const json = await resposta.json();

console.log(json);

document.getElementById("resultado").textContent =
JSON.stringify(json,null,2);
  
};

leitor.readAsDataURL(foto.files[0]);

}

</script>

</body>

</html>

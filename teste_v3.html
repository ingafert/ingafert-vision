<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<title>Ingafert Vision V3</title>

<style>

body{
    font-family:Arial;
    background:#16351f;
    color:#fff;
    max-width:900px;
    margin:auto;
    padding:30px;
}

h1{
    color:#ffd54a;
}

button{
    padding:12px 25px;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;
}

img{
    max-width:350px;
    margin-top:20px;
    border-radius:10px;
}

.card{
    margin-top:25px;
    background:#21472c;
    border-radius:10px;
    padding:20px;
}

.card h2{
    margin-top:0;
    color:#ffd54a;
}

a.botao{
    display:inline-block;
    margin-top:20px;
    background:#ffd54a;
    color:#000;
    padding:12px 20px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

pre{
    background:#111;
    padding:15px;
    border-radius:10px;
    overflow:auto;
}

</style>

</head>

<body>

<h1>INGAFERT VISION AI V3</h1>

<input
type="file"
id="foto"
accept="image/*"
capture="environment">

<br>

<button onclick="analisar()">
Analisar Peça
</button>

<br><br>

<img id="preview">

<div id="resultado"></div>

<script>

async function analisar(){

    const foto=document.getElementById("foto");

    if(!foto.files.length){

        alert("Escolha uma imagem.");

        return;

    }

    const leitor=new FileReader();

    leitor.onload=async()=>{

        document.getElementById("preview").src=leitor.result;

        document.getElementById("resultado").innerHTML="Analisando...";

        const resposta=await fetch("/api/analisar_v3",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                imagem:leitor.result

            })

        });

        const json=await resposta.json();

        if(json.status!="ok"){

            document.getElementById("resultado").innerHTML=
            "<pre>"+JSON.stringify(json,null,2)+"</pre>";

            return;

        }

        document.getElementById("resultado").innerHTML=`

<div class="card">

<h2>${json.analise.nome}</h2>

<p><b>Marca:</b> ${json.analise.marca || "-"}</p>

<p><b>Código:</b> ${json.analise.codigo_original || "-"}</p>

<p><b>Descrição:</b></p>

<p>${json.analise.descricao || "-"}</p>

<a
class="botao"
target="_blank"
href="${json.google}">
🔍 Procurar no site da Ingafert
</a>

<pre>${JSON.stringify(json.analise,null,2)}</pre>

</div>

`;

    };

    leitor.readAsDataURL(foto.files[0]);

}

</script>

</body>
</html>
